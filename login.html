<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login UI</title>

<style>
/* styles.css */
body {
  background: #212531;
  color: #747b92;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
}

.card {
  display: flex;
  align-content: stretch;
  width: 660px;
  height: 360px;
  border-radius: 16px;
  background: rgb(0 0 0 / 32%);
}

.card-nav {
  position: relative;
  align-self: stretch;
  display: flex;
  flex-direction: column;
  justify-content: center;
  width: 148px;
  list-style: none;
  margin: 0;
  padding: 0;
}

.card-nav li {
  flex: 1 1 auto;
  display: grid;
  place-items: center;
}

.card-nav button {
  background: transparent;
  border: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  opacity: 0.75;
  transition: 0.3s;
  color: #fff;
}

.card-nav button.active {
  color: #f9f9f9;
  opacity: 1;
}

.card-nav button:not(.active):hover {
  opacity: 1;
}

.active-bar {
  position: absolute;
  top: 33.33%;
  left: 0;
  width: 5px;
  border-radius: 2.5px;
  height: 33.33%;
  background: #4672ff;
  transition: 0.4s ease-in-out;
}

.card-hero {
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  margin: -48px 0;
  flex: 0 0 300px;
  overflow: hidden;
  border-radius: 12px;
  background: #4672ff;
}

.card-hero-inner {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  transition: 0.5s ease-in-out;
}

.card-hero-content {
  height: 456px;
  width: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

h2, h3 {
  text-align: left;
  font-weight: 400;
  margin: 0;
  padding-left: 24px;
  color: #f9f9f9;
}

.card-hero h2 {
  margin: 0 0 2px;
}

.card-hero h3 {
  opacity: 0.75;
}

.card-hero img {
  width: 100%;
}

.card-form {
  position: relative;
  overflow: hidden;
  padding: 24px;
  width: 400px;
}

.forms {
  position: absolute;
  height: 200%;
  left: 0;
  top: 0;
  transition: 0.5s ease-in-out;
}

form {
  height: 50%;
}

input {
  display: block;
  width: 100%;
  margin-bottom: 10px;
  padding: 10px;
}

button.submit {
  padding: 10px;
  width: 100%;
}
</style>
</head>

<body>

<div class="card">
  <ul class="card-nav">
    <li>
      <span class="active-bar"></span>
    </li>

    <li>
      <button type="button" class="signin active" onclick="selectView('signin')">
        <span>Sign In</span>
      </button>
    </li>

    <li>
      <button type="button" class="signup" onclick="selectView('signup')">
        <span>Sign Up</span>
      </button>
    </li>
  </ul>

  <div class="card-hero">
    <div class="card-hero-inner">

      <div class="card-hero-content signin">
        <h2>Welcome Back.</h2>
        <h3>Please your credentials.</h3>
      </div>

      <div class="card-hero-content signup">
        <h2>Sign Up Now.</h2>
        <h3>Join the crowd get started.</h3>
      </div>

    </div>
  </div>

  <div class="card-form">
    <div class="forms">

      <form id="signin" class="active">
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button class="submit">Login</button>
      </form>

      <form id="signup">
        <input type="text" placeholder="Name">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button class="submit">Create Account</button>
      </form>

    </div>
  </div>
</div>

<script>
// main.js
const navButtons =
  document.querySelectorAll(".card-nav button"),
  cardForms =
  document.querySelector(".card-form .forms"),
  activeBar =
  document.querySelector(".active-bar"),
  cardHeroInner =
  document.querySelector(".card-hero-inner");

const selectView = view => {
  for (let button of navButtons) {
    button.classList.remove("active");

    if (button.classList.contains(view)) {
      button.classList.add("active");
    }
  }

  if (view === "signin") {
    cardForms.style.top = "0";
    activeBar.style.top = "33.33%";
    cardHeroInner.style.top = "0";
  } else {
    cardForms.style.top = "-100%";
    activeBar.style.top = "66.66%";
    cardHeroInner.style.top = "-100%";
  }
};
</script>

</body>
</html>
